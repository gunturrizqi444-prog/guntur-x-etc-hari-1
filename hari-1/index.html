<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Piece Character Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --panel: rgba(15, 23, 42, .78);
    --line: rgba(148, 163, 184, .22);
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --gold: #f59e0b;
    --red: #ef4444;
    --green: #22c55e;
  }

  body {
    min-height: 100vh;
    font-family: Inter, "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background:
      linear-gradient(135deg, rgba(56, 189, 248, .16), transparent 32%),
      linear-gradient(315deg, rgba(245, 158, 11, .16), transparent 34%),
      var(--bg);
    display: flex;
    justify-content: center;
    padding: 24px;
  }

  .app { width: min(1060px, 100%); }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  h1 { font-size: clamp(28px, 5vw, 54px); line-height: .95; letter-spacing: 0; }
  .subtitle { color: var(--muted); margin-top: 8px; font-size: 15px; }

  .status {
    min-width: 190px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(15, 23, 42, .62);
    color: var(--muted);
    font-size: 13px;
    text-align: right;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 16px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 24px 70px rgba(2, 6, 23, .38);
    backdrop-filter: blur(18px);
  }

  .stage {
    min-height: 520px;
    padding: 22px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 18px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .stat {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    background: rgba(255, 255, 255, .04);
  }

  .num { font-size: 26px; font-weight: 800; }
  .lbl { margin-top: 2px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .card-wrap {
    display: grid;
    place-items: center;
    min-height: 330px;
  }

  .card {
    width: min(420px, 100%);
    min-height: 300px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background:
      linear-gradient(160deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
      #111827;
    position: relative;
    overflow: hidden;
    padding: 24px;
    display: grid;
    align-content: end;
    gap: 14px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: -40% -20% auto;
    height: 240px;
    background: radial-gradient(circle, rgba(56,189,248,.35), transparent 62%);
    transform: rotate(-12deg);
  }

  .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    border: 1px solid rgba(255,255,255,.28);
    background: rgba(15, 23, 42, .82);
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 0;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .rarity { position: relative; z-index: 1; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.4px; color: var(--accent); }
  .name { position: relative; z-index: 1; font-size: clamp(28px, 5vw, 42px); line-height: 1; font-weight: 900; letter-spacing: 0; }
  .meta { position: relative; z-index: 1; display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 10px;
    color: #dbeafe;
    background: rgba(15, 23, 42, .72);
    font-size: 12px;
  }

  .card.common { border-color: rgba(148, 163, 184, .45); }
  .card.rare { border-color: rgba(56, 189, 248, .75); box-shadow: 0 0 38px rgba(56, 189, 248, .18); }
  .card.epic { border-color: rgba(239, 68, 68, .75); box-shadow: 0 0 42px rgba(239, 68, 68, .18); }
  .card.ssr { border-color: rgba(245, 158, 11, .9); box-shadow: 0 0 54px rgba(245, 158, 11, .28); }
  .card.ssr .rarity { color: var(--gold); }
  .card.epic .rarity { color: var(--red); }
  .card.rare .rarity { color: var(--accent); }

  @keyframes reveal { from { transform: translateY(18px) scale(.96); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes shine { 0% { transform: translateX(-120%) rotate(18deg); } 100% { transform: translateX(220%) rotate(18deg); } }
  .card.reveal { animation: reveal .34s ease; }
  .card.reveal::after {
    content: "";
    position: absolute;
    top: -30%;
    bottom: -30%;
    width: 80px;
    background: rgba(255,255,255,.22);
    filter: blur(12px);
    animation: shine .65s ease;
  }

  .controls { display: grid; gap: 12px; }
  .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn {
    min-height: 52px;
    border: 0;
    border-radius: 8px;
    color: #06111f;
    background: #7dd3fc;
    font-weight: 900;
    cursor: pointer;
    transition: transform .12s ease, filter .16s ease;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: translateY(1px) scale(.99); }
  .btn.gold { background: #fbbf24; }
  .btn:disabled { cursor: not-allowed; filter: grayscale(.7); opacity: .65; }

  .pity-top { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
  .pity-track { height: 10px; border-radius: 999px; background: rgba(148, 163, 184, .16); overflow: hidden; }
  .pity-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); transition: width .25s ease; }

  .side { padding: 18px; display: grid; gap: 18px; align-content: start; }
  .section-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 10px; }
  .history { display: grid; gap: 8px; }
  .chip {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 10px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    background: rgba(255,255,255,.04);
    font-size: 13px;
  }
  .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-rarity { color: var(--muted); font-weight: 800; font-size: 11px; }

  .pool { display: grid; gap: 8px; max-height: 300px; overflow: auto; padding-right: 4px; }
  .pool-item {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    background: rgba(255,255,255,.035);
  }
  .pool-name { font-size: 13px; font-weight: 800; }
  .pool-meta { margin-top: 4px; color: var(--muted); font-size: 11px; }

  @media (max-width: 820px) {
    body { padding: 14px; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .status { width: 100%; text-align: left; }
    .layout { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
    .stage { min-height: auto; padding: 16px; }
    .buttons { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>One Piece Gacha</h1>
        <p class="subtitle">Tarik karakter dari onepieceapi.com dan kejar bounty tertinggi.</p>
      </div>
      <div class="status" id="loadStatus">Memuat kru...</div>
    </header>

    <div class="layout">
      <section class="panel stage">
        <div class="stats">
          <div class="stat"><div class="num" id="total">0</div><div class="lbl">Total Tarik</div></div>
          <div class="stat"><div class="num" id="ssrCount">0</div><div class="lbl">Legend</div></div>
          <div class="stat"><div class="num" id="poolCount">0</div><div class="lbl">Pool API</div></div>
        </div>

        <div class="card-wrap">
          <article class="card" id="card">
            <div class="avatar" id="avatar">?</div>
            <div class="rarity" id="cardRarity">Ready</div>
            <div class="name" id="cardName">Tekan Tarik</div>
            <div class="meta" id="cardMeta">
              <span class="pill">Data dari One Piece API</span>
            </div>
          </article>
        </div>

        <div class="controls">
          <div>
            <div class="pity-top"><span>Pity ke Legend</span><span id="pityText">0 / 10</span></div>
            <div class="pity-track"><div class="pity-fill" id="pityFill"></div></div>
          </div>
          <div class="buttons">
            <button class="btn" id="tarik1" disabled>Tarik 1x</button>
            <button class="btn gold" id="tarik10" disabled>Tarik 10x</button>
          </div>
        </div>
      </section>

      <aside class="panel side">
        <section>
          <div class="section-title">Riwayat Terakhir</div>
          <div class="history" id="history"></div>
        </section>
        <section>
          <div class="section-title">Character Pool</div>
          <div class="pool" id="pool"></div>
        </section>
      </aside>
    </div>
  </main>

<script>
  const API_URL = "https://www.onepieceapi.com/api/characters";
  const FALLBACK_CHARACTERS = [
    { name: { en: "Monkey D. Luffy" }, status: "Alive", height: 174, blood_type: "F", image_url: null, bounties: [{ amount: 3000000000, is_active: true }] },
    { name: { en: "Roronoa Zoro" }, status: "Alive", height: 181, blood_type: "XF", image_url: null, bounties: [{ amount: 1111000000, is_active: true }] },
    { name: { en: "Nami" }, status: "Alive", height: 170, blood_type: "X", image_url: null, bounties: [{ amount: 366000000, is_active: true }] },
    { name: { en: "Sanji" }, status: "Alive", height: 180, blood_type: "S", image_url: null, bounties: [{ amount: 1032000000, is_active: true }] },
    { name: { en: "Tony Tony Chopper" }, status: "Alive", height: 90, blood_type: "X", image_url: null, bounties: [{ amount: 1000, is_active: true }] }
  ];

  const rarityLabel = {
    ssr: "Legend",
    epic: "Yonko Tier",
    rare: "Supernova",
    common: "Crewmate"
  };

  let characters = [];
  let pity = 0;
  let total = 0;
  let ssrCount = 0;

  const card = document.getElementById("card");
  const avatar = document.getElementById("avatar");
  const cardName = document.getElementById("cardName");
  const cardRarity = document.getElementById("cardRarity");
  const cardMeta = document.getElementById("cardMeta");
  const totalEl = document.getElementById("total");
  const ssrCountEl = document.getElementById("ssrCount");
  const poolCount = document.getElementById("poolCount");
  const pityText = document.getElementById("pityText");
  const pityFill = document.getElementById("pityFill");
  const history = document.getElementById("history");
  const pool = document.getElementById("pool");
  const loadStatus = document.getElementById("loadStatus");
  const tarik1 = document.getElementById("tarik1");
  const tarik10 = document.getElementById("tarik10");

  function getName(character) {
    return character?.name?.en || character?.name || "Unknown Character";
  }

  function getBounty(character) {
    const bounties = Array.isArray(character.bounties) ? character.bounties : [];
    if (bounties.length === 0) return 0;
    const active = bounties.find((bounty) => bounty.is_active);
    return Number((active || bounties[0]).amount) || 0;
  }

  function formatBounty(amount) {
    if (!amount) return "No bounty";
    return `${amount.toLocaleString("id-ID")} berries`;
  }

  function getInitials(name) {
    return name
      .split(" ")
      .filter(Boolean)
      .slice(0, 2)
      .map((word) => word[0])
      .join("")
      .toUpperCase();
  }

  function pilihAcak(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function getRarityByBounty(character) {
    const bounty = getBounty(character);
    if (bounty >= 1000000000) return "ssr";
    if (bounty >= 500000000) return "epic";
    if (bounty >= 100000000) return "rare";
    return "common";
  }

  function pickByRarity(kelas) {
    const matching = characters.filter((character) => getRarityByBounty(character) === kelas);
    return pilihAcak(matching.length ? matching : characters);
  }

  function rollSatu() {
    total += 1;
    pity += 1;

    const acak = Math.random();
    let kelas = "common";
    if (pity >= 10 || acak < 0.03) {
      kelas = "ssr";
      pity = 0;
      ssrCount += 1;
    } else if (acak < 0.10) {
      kelas = "epic";
    } else if (acak < 0.30) {
      kelas = "rare";
    }

    const character = pickByRarity(kelas);
    return { kelas: getRarityByBounty(character), character };
  }

  function tampilkan(hasil) {
    const character = hasil.character;
    const name = getName(character);
    const bounty = getBounty(character);
    const img = character.image_url;

    avatar.innerHTML = img ? `<img src="${img}" alt="${name}">` : getInitials(name);
    cardName.textContent = name;
    cardRarity.textContent = rarityLabel[hasil.kelas];
    cardMeta.innerHTML = `
      <span class="pill">${formatBounty(bounty)}</span>
      <span class="pill">${character.status || "Unknown"}</span>
      <span class="pill">${character.height ? `${character.height} cm` : "Height unknown"}</span>
      <span class="pill">Blood ${character.blood_type || "Unknown"}</span>
    `;

    card.className = "card";
    card.offsetWidth;
    card.className = `card ${hasil.kelas} reveal`;

    totalEl.textContent = total;
    ssrCountEl.textContent = ssrCount;
    pityText.textContent = `${pity} / 10`;
    pityFill.style.width = `${(pity / 10) * 100}%`;
  }

  function tambahRiwayat(hasil) {
    const name = getName(hasil.character);
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerHTML = `<span class="chip-name">${name}</span><span class="chip-rarity">${rarityLabel[hasil.kelas]}</span>`;
    history.prepend(chip);

    while (history.children.length > 8) {
      history.lastElementChild.remove();
    }
  }

  function tarik(jumlah) {
    let hasilTerakhir;
    for (let i = 0; i < jumlah; i += 1) {
      hasilTerakhir = rollSatu();
      tambahRiwayat(hasilTerakhir);
    }
    tampilkan(hasilTerakhir);
  }

  function renderPool() {
    pool.innerHTML = "";
    characters.slice(0, 20).forEach((character) => {
      const item = document.createElement("div");
      const name = getName(character);
      item.className = "pool-item";
      item.innerHTML = `
        <div class="pool-name">${name}</div>
        <div class="pool-meta">${rarityLabel[getRarityByBounty(character)]} - ${formatBounty(getBounty(character))}</div>
      `;
      pool.appendChild(item);
    });
    poolCount.textContent = characters.length;
  }

  async function loadCharacters() {
    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      characters = Array.isArray(data) ? data : data.results || data.data || [];
      if (!characters.length) throw new Error("Character pool kosong");
      loadStatus.textContent = `API aktif - ${characters.length} karakter dimuat`;
    } catch (error) {
      characters = FALLBACK_CHARACTERS;
      loadStatus.textContent = "API gagal, memakai fallback lokal";
    }

    renderPool();
    tarik1.disabled = false;
    tarik10.disabled = false;
  }

  tarik1.addEventListener("click", () => tarik(1));
  tarik10.addEventListener("click", () => tarik(10));
  loadCharacters();
</script>
</body>
</html>
